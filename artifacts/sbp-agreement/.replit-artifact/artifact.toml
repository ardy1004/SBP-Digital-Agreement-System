kind = "web"
previewPath = "/"
title = "SBP Digital Agreement System"
version = "1.0.0"
id = "artifacts/sbp-agreement"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19985

[services.development]
run = "pnpm --filter @workspace/sbp-agreement run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/sbp-agreement", "run", "build" ]
publicDir = "artifacts/sbp-agreement/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19985"
BASE_PATH = "/"
